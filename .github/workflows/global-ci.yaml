name: Global CI

on:
  push:
    branches:
    - main
    - 'release-*'
    tags:
    - 'v*'
  pull_request:
    branches:
    - main
    - 'release-*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - id: get-tag
        run: |
          echo "Get tag for quay.io/konveyor images"      
          if [[ "${{ github.event_name }}" == "push" ]]; then
            branch="${{ github.ref_name }}"
          else
            branch="${{ github.base_ref }}"
          fi

          if [[ "$branch" == "main" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$branch" >> "$GITHUB_OUTPUT"
          fi
          echo "$(grep tag "$GITHUB_OUTPUT")"

  build-hub:
    name: Build tackle2-hub
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        repository: konveyor/tackle2-hub
        ref: ${{ github.event_name == 'push' && github.ref || github.base_ref }}
        path: tackle2-hub

    - uses: actions/checkout@v3
      with:
        path: tackle2-hub/tackle2-seed

    - name: Build hub and save image
      working-directory: tackle2-hub
      env:
        IMG: ttl.sh/konveyor-hub-${{ github.sha }}:4h
      run: |
        podman build --build-arg SEED_ROOT=/opt/app-root/src/tackle2-seed -t $IMG .
        podman push $IMG

  parse-pr-refs:
    name: Parse PR references
    runs-on: ubuntu-24.04
    outputs:
      koncur_ref: ${{ steps.parse.outputs.koncur_ref }}
    steps:
    - name: Parse PR description for test references
      id: parse
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        # Default to main branch
        KONCUR_REF="main"

        if [ "${{ github.event_name }}" == "pull_request" ] && [ -n "$PR_BODY" ]; then
          # Look for "Koncur PR: 123" or "koncur PR: 123" pattern
          KONCUR_PR=$(echo "$PR_BODY" | grep -oPi '[K|k]oncur [P|p][R|r]:\s*\K\d+' | head -n1)

          if [ -n "$KONCUR_PR" ]; then
            KONCUR_REF="refs/pull/${KONCUR_PR}/head"
            echo "Found Koncur PR reference: #${KONCUR_PR}"
          fi
        fi

        echo "koncur_ref=${KONCUR_REF}" >> $GITHUB_OUTPUT
        echo "Koncur ref: ${KONCUR_REF}"

  e2e:
    needs: [setup, build-hub, parse-pr-refs]
    uses: konveyor/ci/.github/workflows/global-ci-bundle.yml@main
    with:
      operator_bundle: quay.io/konveyor/tackle2-operator-bundle:${{ needs.setup.outputs.tag }}
      run_api_tests: false
      run_koncur_hub_tests: true
      koncur_ref: ${{ needs.parse-pr-refs.outputs.koncur_ref }}
      tackle_cr: |
        kind: Tackle
        apiVersion: tackle.konveyor.io/v1alpha1
        metadata:
          name: tackle
        spec:
          image_pull_policy: IfNotPresent
          analyzer_container_requests_cpu: 100m
          provider_java_container_requests_cpu: 100m
          provider_python_container_requests_cpu: 100m
          feature_auth_required: false
          hub_image_fqin: ttl.sh/konveyor-hub-${{ github.sha }}:4h
